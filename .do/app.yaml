name: researchbuddy
region: nyc
services:
  - name: web
    environment_slug: node-js
    github:
      repo: sethuchandra3/researchbuddy
      branch: main
      deploy_on_push: true
    build_command: npm run build
    run_command: npm start
    http_port: 8080
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb
    envs:
      - key: DIGITAL_OCEAN_MODEL_ACCESS_KEY
        scope: RUN_TIME
        type: SECRET
      - key: RODNEY_MODEL
        scope: RUN_TIME
        value: anthropic-claude-4.6-sonnet
